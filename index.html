<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Shrimp Track</title>
    <meta name="description" content="Shrimp Growth Tracker - Monitor and manage shrimp farming operations" />
    <meta name="author" content="Shrimp Track" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Shrimp Track" />
    <meta property="og:description" content="Shrimp Growth Tracker - Monitor and manage shrimp farming operations" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shrimp Track" />
    <meta name="twitter:description" content="Shrimp Growth Tracker - Monitor and manage shrimp farming operations" />
    <meta name="twitter:image" content="/og-image.png" />
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('Old Service Worker cleared');
          }
        });
      }
      
      // Force reload if a new version is detected
      if (window.localStorage.getItem('app_version') !== '1.0.3') {
        window.localStorage.setItem('app_version', '1.0.3');
        window.location.reload(true);
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx?v=1.0.3"></script>
  </body>
</html>
